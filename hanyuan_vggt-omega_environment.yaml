# =============================================================================
# environment.yaml — Conda environment for SIA3D-Camera-inversion
#
#   Backend   : hanyuan     (Hunyuan3D-2 + PyTorch3D)
#   Pose model: vggt_omega  (Facebook VGGT-Omega)
#
# This file holds ALL Python dependencies for both models. The repositories
# themselves (Hunyuan3D-2 and vggt-omega) are cloned and built by setup.sh.
#
# Create the environment with:
#   conda env create -f hanyuan_vggt-omega_environment.yaml
#   conda activate hanyuan_vggt-omega
#
# Conflict notes:
#   - VGGT-Omega requires numpy<2  →  numpy is pinned to 1.26.4 (also fine for
#     Hunyuan3D-2 and PyTorch3D), avoiding the numpy 2.x ABI conflict.
#   - torch 2.3.1 / torchvision 0.18.1 satisfy VGGT-Omega's torch>=2.3,
#     torchvision>=0.18 and Hunyuan3D-2's torch requirement.
#   - transformers>=5 requires torch>=2.4  →  pinned to 4.50.0 for torch 2.3.1.
#   - Hunyuan3D-2 is installed from its OWN requirements.txt in setup.sh
#     (official install). That file lists UNPINNED torch/torchvision/numpy, so
#     setup.sh exports PIP_CONSTRAINT to lock them to the versions below and
#     prevent it from upgrading numpy to 2.x or replacing the CUDA torch build.
# =============================================================================
name: hanyuan_vggt-omega

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  - python=3.11

  # ── Core scientific stack (numpy<2 for VGGT-Omega compatibility) ───────────
  - numpy=1.26.4

  # ── Build tools (needed to compile the C++/CUDA extensions in setup.sh) ────
  - ninja
  - cmake
  - pybind11
  - git
  - pip

  # ── PyTorch + CUDA ─────────────────────────────────────────────────────────
  - pytorch=2.3.1
  - torchvision=0.18.1
  - pytorch-cuda=12.1

  # ── Pip dependencies (shared + per-model) ─────────────────────────────────
  - pip:
      # Pin numpy here too — rembg/gradio deps otherwise pull numpy 2.x during
      # conda's pip subprocess and break VGGT-Omega (numpy<2).
      - numpy==1.26.4

      # ---- shared by hanyuan + vggt_omega ----
      - einops
      - opencv-python
      - safetensors
      - pillow
      - omegaconf
      - tqdm

      # ---- hanyuan: diffusion / model loading ----
      - diffusers==0.30.1
      - transformers==4.50.0
      - tokenizers==0.21.4
      - accelerate
      - huggingface_hub==0.34.4  # transformers 4.50 requires huggingface-hub<1.0

      # ---- hanyuan: mesh processing ----
      - trimesh
      - pymeshlab
      - pygltflib
      - xatlas

      # ---- hanyuan: demo / serving ----
      - gradio
      - fastapi
      - uvicorn
      - rembg
      - onnxruntime

      # NOTE: PyTorch3D is NOT listed here because its setup.py imports torch at
      # build time. conda env create runs pip in an isolated subprocess that does
      # not have torch yet, which causes a build failure. PyTorch3D is installed
      # by setup.sh after the conda environment is fully activated.
